<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>The Last Light of Nambale – Asaba Jumah</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
  user-select:none;
}

/* HEADER */
.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;

  display:flex;
  align-items:center;

  justify-content:center;

  transition:0.3s;
  z-index:999;
}

/* NAV LINKS CENTER */
.navbar-links{
  display:flex;
  gap:25px;
}

/* LINKS */
.navbar a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.navbar a:hover{
  color:#38bdf8;
}

/* SCROLL EFFECT */
.navbar.scrolled{
  background:#020617ee;
  backdrop-filter:blur(10px);
  border-bottom:1px solid #1e293b;
  height:60px;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:120px 20px 60px;
  position:relative;
}

/* WAVES */
.wave{
  position:absolute;
  width:200%;
  height:200px;
  background:rgba(56,189,248,0.08);
  border-radius:45%;
  animation:waveMove 12s linear infinite;
}

.wave1{ bottom:-80px; }
.wave2{ bottom:-100px; animation-duration:18s; opacity:0.5; }

@keyframes waveMove{
  from{ transform:translateX(0) rotate(0deg); }
  to{ transform:translateX(-25%) rotate(360deg); }
}

/* CARD */
.book-card{
  position:relative;
  z-index:2;
  max-width:1100px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:40px;
  align-items:center;
}

/* COVER */
.book-cover{text-align:center;}

.book-cover img{
  width:100%;
  max-width:360px;
  border-radius:18px;
  box-shadow:0 0 35px rgba(56,189,248,0.35);
  transition:0.4s;
}

.book-cover img:hover{
  transform:scale(1.03);
}

/* CONTENT */
.book-content h1{
  font-size:48px;
  margin-bottom:15px;
  color:#38bdf8;
}

.book-content p{
  color:#cbd5e1;
  line-height:1.8;
  font-size:17px;
}

/* BUTTONS */
.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-top:30px;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 24px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn-google{
  background:#38bdf8;
  color:#020617;
}

.btn-play{
  background:#22c55e;
  color:white;
}

.btn:hover{
  transform:translateY(-3px);
  opacity:0.9;
}

/* ABOUT */
.about-book{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.about-box{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:18px;
  padding:30px;
}

/* FOOTER */
footer{
  margin-top:50px;
  text-align:center;
  padding:35px 20px;
  border-top:1px solid #1e293b;
  color:#94a3b8;
}

.footer-links a{
  color:#38bdf8;
  margin:10px;
  font-size:24px;
  transition:0.3s;
}

.footer-links a:hover{
  color:white;
  transform:scale(1.2);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Blog</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">

<div class="wave wave1"></div>
<div class="wave wave2"></div>

<div class="book-card">

  <div class="book-cover">
    <img src="https://www.asabajumah.top/books/img/the-last-night-of-nambale.png">
  </div>

  <div class="book-content">

    <h1>The Last Light of Nambale</h1>

    <p>
      An inspirational story of courage and change.
    </p>

    <div class="buttons">

      <a class="btn btn-google" href="#">
        <i class="fab fa-google"></i> Google Books
      </a>

      <a class="btn btn-play" href="#">
        <i class="fab fa-google-play"></i> Google Play
      </a>

    </div>

  </div>

</div>

</section>

<!-- ABOUT -->
<section class="about-book">
<div class="about-box">
<h2>About The Book</h2>
<p>
A story of hope, courage, and survival in a forgotten village...
</p>
</div>
</section>

<!-- FOOTER -->
<footer>
<p>© 2026 Asaba Jumah</p>
</footer>

<!-- SCROLL SCRIPT -->
<script>
window.addEventListener("scroll", function(){
  let nav = document.querySelector(".navbar");

  if(window.scrollY > 50){
    nav.classList.add("scrolled");
  } else {
    nav.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
