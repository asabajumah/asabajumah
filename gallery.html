<!-- PROTECTION -->

<div id="protectedMsg">Protected 🔒</div>

<script>

function showProtected() {

  let msg = document.getElementById("protectedMsg");

  msg.style.display = "block";

  setTimeout(() => {
    msg.style.display = "none";
  }, 1500);

}

document.addEventListener("copy", function(e){
  e.preventDefault();
  showProtected();
});

document.addEventListener("contextmenu", function(e){
  e.preventDefault();
  showProtected();
});

document.addEventListener("keydown", function(e){

  if (
    e.key === "PrintScreen" ||
    (e.ctrlKey && e.key === "c") ||
    (e.ctrlKey && e.key === "u") ||
    (e.ctrlKey && e.shiftKey && e.key === "I")
  ) {
    e.preventDefault();
    showProtected();
  }

});

</script>
